version: '3.8'
services:
  backend:
    build: ./backend
    ports:
      - "4000:4000"
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    restart: unless-stopped

  sonarqube:
    image: sonarqube:10.0-community
    ports:
      - "9000:9000"
    environment:
      - SONAR_JDBC_USERNAME=sonar
      - SONAR_JDBC_PASSWORD=sonar
    restart: unless-stopped
